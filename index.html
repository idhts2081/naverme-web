<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>naver.me</title>
  <link rel="shortcut icon" type="image/x-icon" href="/image/images.png">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <meta property="twitter:title" content="naver.me" />
  <meta property="twitter:image:src" content="https://i.ibb.co/JW59hh6F/Group-6-2.png" />
  <meta property="twitter:description" content="Shorten links into the naver.me format." />
</head>

<body>
  <main id="wrapper">
    <div class="search">
      <div class="box">
        <a href="https://github.com/idhts2081/naverme-web">
          <img class="icon" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
        </a>

        <input class="input" placeholder="Paste a link to shorten.">

        <button class="button">Shorten</button>

        <div class="copied">
          <p class="copiedText"></p>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
